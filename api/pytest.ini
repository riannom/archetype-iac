[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    integration: integration tests
    e2e: end-to-end tests (disabled by default)
# Ignore third-party DeprecationWarnings on Python 3.14. Without this,
# pytest collects/dedupes/renders millions of warnings per shard from
# pytest_asyncio/starlette/fastapi/jose's pre-3.14 use of
# asyncio.iscoroutinefunction and similar, costing ~60-120s per shard.
# Own-code warnings still surface.
filterwarnings =
    ignore::DeprecationWarning:pytest_asyncio
    ignore::DeprecationWarning:starlette
    ignore::DeprecationWarning:fastapi
    ignore::DeprecationWarning:jose
    ignore::DeprecationWarning:passlib
    ignore:.*asyncio\.iscoroutinefunction.*:DeprecationWarning
    ignore:.*datetime\.datetime\.utcnow.*:DeprecationWarning
