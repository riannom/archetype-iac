name: Smoke Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'docker-compose.gui.yml'
      - 'Dockerfile.*'
      - 'install.sh'
      - 'install-controller.sh'
      - 'agent/install.sh'
      - 'api/app/main.py'
      - 'agent/main.py'
      - 'tests/smoke/**'

jobs:
  single-host:
    name: Single-Host Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Run single-host smoke test
        run: bash tests/smoke/smoke_test.sh

      - name: Dump compose logs on failure
        if: failure()
        run: |
          for proj in $(docker compose ls -q 2>/dev/null | grep archetype-smoke || true); do
            docker compose -p "$proj" logs --no-color > "/tmp/smoke-compose-logs.txt" 2>&1 || true
          done

      - name: Upload compose logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-single-host-compose-logs
          path: /tmp/smoke-compose-logs.txt
          retention-days: 7

  multi-host:
    name: Multi-Host Smoke Test
    needs: single-host
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Run multi-host smoke test
        run: bash tests/smoke/multihost_test.sh

      - name: Dump compose logs on failure
        if: failure()
        run: |
          for proj in $(docker compose ls -q 2>/dev/null | grep archetype-multihost || true); do
            docker compose -p "$proj" logs --no-color > "/tmp/multihost-compose-logs.txt" 2>&1 || true
          done

      - name: Upload compose logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-multi-host-compose-logs
          path: /tmp/multihost-compose-logs.txt
          retention-days: 7
