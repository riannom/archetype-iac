name: Confidence Gate (Nightly)

# Confidence Gate previously ran on every PR (~3.7 min wall-clock) alongside
# the dedicated test jobs that already cover its checks. Batch 15 moved it to
# this nightly schedule. The local `make confidence-gate` target remains
# available for developers who want a pre-push smoke check.

on:
  schedule:
    # 06:30 UTC daily, 30 min after nightly-coverage so they don't contend
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: confidence-gate-nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  confidence-gate-required:
    name: Confidence Gate (Required)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine diff base
        id: base
        run: |
          set -euo pipefail
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            echo "base_ref=HEAD~1" >> "$GITHUB_OUTPUT"
          else
            echo "base_ref=HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: |
            api/requirements.txt
            agent/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install confidence gate tooling
        run: pip install pytest

      - name: Plan required checks
        id: plan
        env:
          BASE_REF: ${{ steps.base.outputs.base_ref }}
        run: |
          set -euo pipefail
          python3 scripts/confidence_gate.py \
            --json \
            --required-only \
            --base "$BASE_REF" \
            --rules scripts/confidence_gate_rules_ci.json > /tmp/confidence-plan.json
          python3 - <<'PY'
          import json
          import os

          with open("/tmp/confidence-plan.json", "r", encoding="utf-8") as handle:
              report = json.load(handle)

          checks = [item["check_id"] for item in report.get("selected_checks", [])]
          print("Selected checks:", ", ".join(checks) if checks else "none")

          outputs = {
              "has_api": "true" if any(check.startswith("test-api") for check in checks) else "false",
              "has_agent": "true" if any(check.startswith("test-agent") for check in checks) else "false",
              "has_web": "true" if any(check.startswith("test-web") for check in checks) else "false",
          }

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              for key, value in outputs.items():
                  handle.write(f"{key}={value}\n")
          PY

      - name: Install API dependencies
        if: steps.plan.outputs.has_api == 'true'
        run: |
          cd api
          pip install -r requirements.txt

      - name: Install Agent dependencies
        if: steps.plan.outputs.has_agent == 'true'
        run: |
          cd agent
          pip install -r requirements.txt

      - name: Install Web dependencies
        if: steps.plan.outputs.has_web == 'true'
        run: |
          cd web
          npm ci

      - name: Execute confidence gate
        env:
          BASE_REF: ${{ steps.base.outputs.base_ref }}
        run: |
          make confidence-gate-run \
            BASE="$BASE_REF" \
            CONFIDENCE_RULES="scripts/confidence_gate_rules_ci.json" \
            CONFIDENCE_CHECK_SCOPE=required \
            CONFIDENCE_MIN_SCORE=90

      - name: Upload confidence report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: confidence-gate-report-required
          path: reports/confidence-gate/latest.json
          if-no-files-found: warn
          retention-days: 90

  confidence-gate-optional:
    name: Confidence Gate (Optional)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine diff base
        id: base
        run: |
          set -euo pipefail
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            echo "base_ref=HEAD~1" >> "$GITHUB_OUTPUT"
          else
            echo "base_ref=HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: |
            api/requirements.txt
            agent/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install confidence gate tooling
        run: pip install pytest

      - name: Plan optional checks
        id: plan
        env:
          BASE_REF: ${{ steps.base.outputs.base_ref }}
        run: |
          set -euo pipefail
          python3 scripts/confidence_gate.py \
            --json \
            --optional-only \
            --base "$BASE_REF" \
            --rules scripts/confidence_gate_rules_ci.json > /tmp/confidence-plan-optional.json
          python3 - <<'PY'
          import json
          import os

          with open("/tmp/confidence-plan-optional.json", "r", encoding="utf-8") as handle:
              report = json.load(handle)

          checks = [item["check_id"] for item in report.get("selected_checks", [])]
          print("Selected checks:", ", ".join(checks) if checks else "none")

          outputs = {
              "has_api": "true" if any(check.startswith("test-api") for check in checks) else "false",
              "has_agent": "true" if any(check.startswith("test-agent") for check in checks) else "false",
              "has_web": "true" if any(check.startswith("test-web") for check in checks) else "false",
          }

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              for key, value in outputs.items():
                  handle.write(f"{key}={value}\n")
          PY

      - name: Install API dependencies
        if: steps.plan.outputs.has_api == 'true'
        run: |
          cd api
          pip install -r requirements.txt

      - name: Install Agent dependencies
        if: steps.plan.outputs.has_agent == 'true'
        run: |
          cd agent
          pip install -r requirements.txt

      - name: Install Web dependencies
        if: steps.plan.outputs.has_web == 'true'
        run: |
          cd web
          npm ci

      - name: Execute optional confidence gate
        env:
          BASE_REF: ${{ steps.base.outputs.base_ref }}
        run: |
          make confidence-gate-run \
            BASE="$BASE_REF" \
            CONFIDENCE_RULES="scripts/confidence_gate_rules_ci.json" \
            CONFIDENCE_CHECK_SCOPE=optional \
            CONFIDENCE_MIN_SCORE=90 \
            CONFIDENCE_REPORT="reports/confidence-gate/optional.json"

      - name: Upload optional confidence report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: confidence-gate-report-optional
          path: reports/confidence-gate/optional.json
          if-no-files-found: warn
          retention-days: 90
