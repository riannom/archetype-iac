name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  confidence-gate:
    name: Confidence Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine diff base
        id: base
        env:
          EVENT_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            git fetch origin "${GITHUB_BASE_REF}" --depth=1
            echo "base_ref=origin/${GITHUB_BASE_REF}" >> "$GITHUB_OUTPUT"
          elif [ -n "${EVENT_BEFORE:-}" ] && [ "${EVENT_BEFORE}" != "0000000000000000000000000000000000000000" ]; then
            echo "base_ref=${EVENT_BEFORE}" >> "$GITHUB_OUTPUT"
          else
            echo "base_ref=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            api/requirements.txt
            agent/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Plan selected checks
        id: plan
        run: |
          set -euo pipefail
          python3 scripts/confidence_gate.py \
            --json \
            --base "${{ steps.base.outputs.base_ref }}" \
            --rules scripts/confidence_gate_rules_ci.json > /tmp/confidence-plan.json
          python3 - <<'PY'
          import json
          import os

          with open("/tmp/confidence-plan.json", "r", encoding="utf-8") as handle:
              report = json.load(handle)

          checks = [item["check_id"] for item in report.get("selected_checks", [])]
          print("Selected checks:", ", ".join(checks) if checks else "none")

          outputs = {
              "has_api": "true" if "test-api" in checks else "false",
              "has_agent": "true" if "test-agent" in checks else "false",
              "has_web": "true" if "test-web-container" in checks else "false",
          }

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              for key, value in outputs.items():
                  handle.write(f"{key}={value}\n")
          PY

      - name: Install API dependencies
        if: steps.plan.outputs.has_api == 'true'
        run: |
          cd api
          pip install -r requirements.txt

      - name: Install Agent dependencies
        if: steps.plan.outputs.has_agent == 'true'
        run: |
          cd agent
          pip install -r requirements.txt

      - name: Install Web dependencies
        if: steps.plan.outputs.has_web == 'true'
        run: |
          cd web
          npm ci

      - name: Execute confidence gate
        run: |
          make confidence-gate-run \
            BASE="${{ steps.base.outputs.base_ref }}" \
            CONFIDENCE_RULES="scripts/confidence_gate_rules_ci.json" \
            CONFIDENCE_MIN_SCORE=90

      - name: Upload confidence report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: confidence-gate-report
          path: reports/confidence-gate/latest.json
          if-no-files-found: warn

      - name: Comment confidence summary on PR
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- confidence-gate-report -->";
            const reportPath = "reports/confidence-gate/latest.json";

            let body;
            if (!fs.existsSync(reportPath)) {
              body = [
                marker,
                "## Confidence Gate",
                `Report file \`${reportPath}\` was not produced.`,
              ].join("\n");
            } else {
              const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
              const confidence = report.confidence || {};
              const selected = report.selected_checks || [];
              const results = report.check_results || [];
              const reasons = confidence.reasons || [];
              const remediation = report.remediation || [];

              const selectedLines = selected.length
                ? selected.map((item) => `- \`${item.check_id}\` (${item.required ? "required" : "optional"})`).join("\n")
                : "- none";

              const resultLines = results.length
                ? results
                    .map((item) => {
                      const duration = typeof item.duration_seconds === "number" ? `, ${item.duration_seconds}s` : "";
                      const exitCode = item.exit_code === null || item.exit_code === undefined ? "" : `, exit=${item.exit_code}`;
                      return `- [${String(item.status).toUpperCase()}] \`${item.check_id}\`${exitCode}${duration}`;
                    })
                    .join("\n")
                : "- none";

              const reasonLines = reasons.length
                ? reasons.map((r) => `- ${r}`).join("\n")
                : "- none";

              const remediationLines = remediation.length
                ? remediation.map((r) => `- ${r}`).join("\n")
                : "- none";

              body = [
                marker,
                "## Confidence Gate",
                `Score: **${confidence.score ?? "n/a"}** (${confidence.level ?? "n/a"})`,
                `Mode: \`${report.mode ?? "unknown"}\``,
                `Base: \`${report.base_ref ?? "unknown"}\``,
                "",
                "### Selected Checks",
                selectedLines,
                "",
                "### Check Results",
                resultLines,
                "",
                "### Reasons",
                reasonLines,
                "",
                "### Remediation",
                remediationLines,
              ].join("\n");
            }

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user &&
                comment.user.type === "Bot" &&
                typeof comment.body === "string" &&
                comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            api/requirements.txt
            agent/requirements.txt

      - name: Install API dependencies
        run: |
          cd api
          pip install -r requirements.txt

      - name: Install test tooling
        run: |
          pip install pytest-cov pytest-timeout

      - name: Run API tests with coverage
        env:
          DATABASE_URL: sqlite:///test.db
          REDIS_URL: redis://localhost:6379/0
          WORKSPACE: /tmp/archetype-test
        run: |
          cd api
          PYTHONPATH="${PYTHONPATH}:$(pwd)/.." pytest tests/ -v --tb=short --timeout=60 --cov=app --cov-report=term-missing --cov-report=xml:../reports/api-coverage.xml --cov-fail-under=55

      - name: Install Agent dependencies
        run: |
          cd agent
          pip install -r requirements.txt

      - name: Run Agent tests with coverage
        run: |
          cd agent
          pytest tests/ -v --tb=short --cov=agent --cov-report=term-missing --cov-report=xml:../reports/agent-coverage.xml --cov-fail-under=50

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          cd web
          npm ci

      - name: Run tests with coverage
        run: |
          cd web
          set -euo pipefail
          mapfile -t test_files < <(find src -type f \( -name "*.test.ts" -o -name "*.test.tsx" \) | sort)
          if [ ${#test_files[@]} -eq 0 ]; then
            echo "No frontend test files found."
            exit 1
          fi

          chunk_size=20
          chunk=1
          for ((i=0; i<${#test_files[@]}; i+=chunk_size)); do
            echo "Running frontend test chunk ${chunk}..."
            NODE_OPTIONS="--max-old-space-size=4096" npm test -- --run --pool=forks --poolOptions.forks.minForks=1 --poolOptions.forks.maxForks=1 "${test_files[@]:i:chunk_size}"
            chunk=$((chunk + 1))
          done

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff on API
        run: ruff check api/

      - name: Run ruff on Agent
        run: ruff check agent/

      - name: Enforce no unused Python symbols
        run: ruff check api/ agent/ scripts/ tests/ --select F401,F841

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          cd web
          npm ci

      - name: Type check
        run: |
          cd web
          npx tsc --noEmit

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Shellcheck
        run: |
          shellcheck install.sh install-controller.sh agent/install.sh \
            scripts/upgrade.sh scripts/bump-version.sh scripts/backup.sh scripts/restore.sh \
            scripts/install-gitleaks.sh scripts/install-hooks.sh

  script-tests:
    name: Script Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install BATS
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local

      - name: Run script tests
        run: bats tests/scripts/

  secrets-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
